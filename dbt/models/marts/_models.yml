version: 2

models:
  - name: fct_rental_light_monthly_kwh
    description: |
      Rental-light estimated kWh for a single month, formatted for the MDM
      Loss Analysis rental importer. One row per active rental connection;
      all columns varchar(50). Month selected by the report_month() macro.
    columns:
      - name: "KWH"
        description: |
          Estimated kWh for the report month. NULL when no wattage could be
          resolved (rate code not found in rate_wattage) — surfaced as a
          warning, not an error, since the importer accepts NULL.
        tests:
          - not_null:
              config:
                severity: warn

  - name: fct_street_light_monthly_kwh
    description: |
      Streetlight estimated kWh for a single month, formatted for the MDM
      Loss Analysis streetlight importer. One row per non-rental streetlight;
      all columns varchar(50). Month selected by the report_month() macro.

      Streetlights have no real account or meter number, so [Account Number]
      is a synthesized stable identifier: wge_number + '-' + object_id_1.
      [Account Sub], [Sequence], [Rate Type] and [Disconnect Date] have no
      streetlight source and are always NULL.
    columns:
      - name: "Account Number"
        description: |
          Stable per-light identifier — wge_number + '-' + object_id_1 from
          the GIS inventory. Unique per streetlight; object_id_1 carries the
          uniqueness when wge_number is blank. Streetlights are not metered,
          so this is a synthesized key, not a billing account number. Its
          month-to-month stability depends on object_id_1 staying constant
          across GIS exports.
      - name: "kWh"
        description: |
          Estimated kWh for the report month. NULL when the GIS row has
          neither a usable kwh_hr nor a wattage — surfaced as a warning.
        tests:
          - not_null:
              config:
                severity: warn
