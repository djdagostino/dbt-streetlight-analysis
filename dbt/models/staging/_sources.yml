version: 2

sources:
  - name: wge
    description: |
      Local replica of selected WGE (UIS) tables, written into
      <warehouse_db>.raw.* by ingest/sync_wge.py. The script filters to
      rental-light / streetlight equipment (Equipment prefix 'zz') at ingest
      time, so downstream models can assume that scope.
    database: "{{ env_var('WAREHOUSE_DATABASE') }}"
    schema: raw
    tables:
      - name: csm_connection_master
        description: Connection facts — one row per (Location, Equipment) connection.
        columns:
          - name: location_id
            description: Customer location identifier.
            tests:
              - not_null
          - name: equipment_id
            description: Equipment / asset tag. All rows start with 'zz'.
            tests:
              - not_null
          - name: connection_date
          - name: disconnection_date
            description: 1900-01-01 sentinel = currently connected.
          - name: connection_status
            description: Active / Disconnected / etc.
          - name: fixed_mult
            description: Number of lights on this connection (multiplier for kWh).

      - name: csm_equipment_master
        description: Equipment Class lookup, scoped to streetlight equipment.
        columns:
          - name: equipment_id
            tests:
              - unique
              - not_null
          - name: equip_class

      - name: um00403
        description: |
          Rate history per equipment. Multiple rows per equipment_id; the row
          with the highest connect_seq is the currently-effective rate.
        columns:
          - name: equipment_id
            tests:
              - not_null
          - name: location_id
          - name: connect_seq
            description: Sequence number; highest = latest rate.
          - name: rate1
            description: Billing rate code (e.g., E0250C). FK to seed rate_wattage.bill_rate.
