# dbt-sqlserver profile template for the streetlight_rental project.
#
# Real values live in .env (gitignored). This file is committed and serves as
# a reference for anyone cloning the repo. Do NOT put credentials here.
#
# Auth: configured for SQL authentication (user/password from .env).
# To switch to Windows integrated auth: comment out the user/password lines
# below and replace with  `windows_login: true`.

streetlight_rental:
  target: dev
  outputs:
    dev:
      type: sqlserver
      driver:   "{{ env_var('SQLSERVER_ODBC_DRIVER', 'ODBC Driver 18 for SQL Server') }}"
      server:   "{{ env_var('WAREHOUSE_SERVER') }}"
      port: 1433
      database: "{{ env_var('WAREHOUSE_DATABASE') }}"
      schema: dbo
      user:     "{{ env_var('WAREHOUSE_USER') }}"
      password: "{{ env_var('WAREHOUSE_PASSWORD') }}"
      encrypt: true
      trust_cert: true
      threads: 4
