name: 'streetlight_rental'
version: '1.0.0'
config-version: 2

profile: 'streetlight_rental'

model-paths:    ["models"]
seed-paths:     ["seeds"]
test-paths:     ["tests"]
analysis-paths: ["analyses"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  streetlight_rental:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  streetlight_rental:
    +schema: raw
    rate_wattage:
      +column_types:
        BillRate:       varchar(16)
        ESRate:         varchar(16)
        LightType:      varchar(64)
        Wattage:        int
        NominalWattage: int
    hours_of_darkness_daily:
      # Static reference data — Naval Observatory daily darkness duration
      # for Westfield, MA. Year-agnostic; downstream models apply it to any year.
      +column_types:
        month_num:      tinyint
        day_num:        tinyint
        darkness_hours: decimal(6,4)
